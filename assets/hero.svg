<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080B10"/>
      <stop offset="45%" stop-color="#0E1A22"/>
      <stop offset="100%" stop-color="#15242C"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64FFDA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC26B"/>
      <stop offset="100%" stop-color="#FF5E7E"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF7A59" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF7A59" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#dots)"/>
  <ellipse cx="1055" cy="90" rx="240" ry="200" fill="url(#warmGlow)"/>

  <!-- ==================== TEXT BLOCK ==================== -->
  <g transform="translate(70,0)">
    <rect x="0" y="118" width="4" height="122" fill="url(#warm)"/>
    <text x="26" y="116" fill="#FF8A6B" font-size="16" letter-spacing="11" font-weight="700">A N O M A L Y</text>
    <text x="24" y="180" fill="#F5F7FA" font-size="58" font-weight="700" letter-spacing="1">Mahesh Babu Kona</text>
    <text x="26" y="220" fill="#9FB3C8" font-size="20" font-weight="400">Not built to fit the curve — built to break it, then redraw it.</text>
    <text x="26" y="246" fill="#6B7E90" font-size="15" font-weight="400">What looks like noise is just signal in the wrong distribution.</text>

    <!-- identity chips -->
    <g transform="translate(26,266)" font-size="13" fill="#CBD5E1" font-weight="500">
      <g>
        <rect x="0" y="0" width="140" height="30" rx="15" fill="#ffffff" opacity="0.06"/>
        <circle cx="18" cy="15" r="4" fill="#FF8A6B">
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="32" y="19">GenAI Engineer</text>
      </g>
      <g transform="translate(152,0)">
        <rect x="0" y="0" width="140" height="30" rx="15" fill="#ffffff" opacity="0.06"/>
        <circle cx="18" cy="15" r="4" fill="#38BDF8"/>
        <text x="32" y="19">IEEE SCOPES '24</text>
      </g>
      <g transform="translate(304,0)">
        <rect x="0" y="0" width="162" height="30" rx="15" fill="#ffffff" opacity="0.06"/>
        <circle cx="18" cy="15" r="4" fill="#64FFDA"/>
        <text x="32" y="19">Builds in the open</text>
      </g>
    </g>
  </g>

  <!-- ==================== ANOMALY / OUTLIER VIZ ==================== -->
  <g transform="translate(0,0)">
    <!-- baseline axis -->
    <line x1="735" y1="256" x2="1130" y2="256" stroke="#2C4049" stroke-width="1.5"/>
    <!-- the distribution: a bell curve everyone else follows -->
    <path d="M745,256 C815,256 835,138 875,138 C915,138 935,256 1005,256" fill="none" stroke="url(#cool)" stroke-width="1.5" opacity="0.35" stroke-dasharray="3 4"/>

    <!-- the crowd: identical points sitting under the curve -->
    <g fill="#4A6472" opacity="0.55">
      <circle cx="796" cy="238" r="3"/><circle cx="812" cy="226" r="3"/><circle cx="828" cy="240" r="3"/>
      <circle cx="842" cy="212" r="3"/><circle cx="852" cy="230" r="3"/><circle cx="860" cy="198" r="3"/>
      <circle cx="866" cy="216" r="3"/><circle cx="872" cy="234" r="3"/><circle cx="846" cy="200" r="3"/>
      <circle cx="878" cy="202" r="3"/><circle cx="884" cy="220" r="3"/><circle cx="892" cy="234" r="3"/>
      <circle cx="900" cy="212" r="3"/><circle cx="910" cy="228" r="3"/><circle cx="922" cy="240" r="3"/>
      <circle cx="836" cy="224" r="3"/><circle cx="856" cy="244" r="3"/><circle cx="870" cy="248" r="3"/>
      <circle cx="808" cy="244" r="3"/><circle cx="940" cy="242" r="3"/><circle cx="818" cy="212" r="3"/>
      <circle cx="888" cy="242" r="3"/><circle cx="864" cy="182" r="3"/><circle cx="878" cy="168" r="3"/>
    </g>
    <text x="868" y="278" fill="#5A6E7A" font-size="11" text-anchor="middle" letter-spacing="1">the distribution</text>

    <!-- divergent trajectory: breaking off and climbing past -->
    <path id="traj" d="M878,168 C960,150 1010,120 1058,86" fill="none" stroke="url(#warm)" stroke-width="2.5"
          stroke-dasharray="10 200">
      <animate attributeName="stroke-dashoffset" values="210;0" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <!-- arrowhead implying "further, always" -->
    <path d="M1058,86 l-14,2 l8,-11" fill="none" stroke="#FF8A6B" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- the anomaly node -->
    <circle cx="1062" cy="80" r="30" fill="none" stroke="#FF7A59" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="18;40;18" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <g filter="url(#soft)">
      <circle cx="1062" cy="80" r="15" fill="#12070A" stroke="url(#warm)" stroke-width="2.5"/>
      <circle cx="1062" cy="80" r="5" fill="url(#warm)">
        <animate attributeName="r" values="4;6;4" dur="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="1062" y="126" fill="#FF8A6B" font-size="12" text-anchor="middle" font-weight="700" letter-spacing="1">the anomaly</text>
  </g>
</svg>
